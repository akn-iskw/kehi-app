<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経費振り分けアプリ 2025</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface2: #f9f8f5;
  --border: #e2ddd6;
  --border2: #cdc8bf;
  --text: #1a1815;
  --text2: #6b6560;
  --text3: #9c978f;
  --accent: #2d5a3d;
  --accent-light: #e8f0eb;
  --accent-mid: #4a8a60;
  --danger: #c0392b;
  --danger-light: #fdf0ee;
  --amber: #b5620a;
  --amber-light: #fef3e2;
  --radius: 10px;
  --radius-sm: 6px;
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141210;
    --surface: #1e1c19;
    --surface2: #252320;
    --border: #302e2a;
    --border2: #403d38;
    --text: #f0ede8;
    --text2: #a09890;
    --text3: #6b6560;
    --accent: #5aaa78;
    --accent-light: #1a2e20;
    --accent-mid: #4a8a60;
    --danger: #e05c4b;
    --danger-light: #2a1815;
    --amber: #d4832a;
    --amber-light: #2a1e0a;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── LAYOUT ── */
.app {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 0 80px;
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-mark {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 16px;
  flex-shrink: 0;
}

header h1 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}

.year-badge {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-light);
  padding: 3px 10px;
  border-radius: 20px;
}

/* ── TABS ── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  padding: 0 20px;
  gap: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.tab {
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.15s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-panel { display: none; padding: 20px; }
.tab-panel.active { display: block; }

/* ── UPLOAD ZONE ── */
.upload-section {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 16px;
}

.upload-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-icon {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.icon-green { background: var(--accent-light); }
.icon-amber { background: var(--amber-light); }

.section-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.upload-body { padding: 16px; }

.dropzone {
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius);
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: background 0.15s;
  background: var(--surface2);
}
.dropzone:hover { background: var(--accent-light); border-color: var(--accent-mid); }
.dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

.drop-icon { font-size: 28px; margin-bottom: 8px; }
.drop-main { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.drop-sub { font-size: 12px; color: var(--text3); }

/* ── PROGRESS ── */
.progress-wrap {
  margin-top: 12px;
  display: none;
}
.progress-wrap.show { display: block; }
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0;
  transition: width 0.3s;
}
.progress-label { font-size: 12px; color: var(--text2); text-align: center; }

/* ── RESULT CARD ── */
.result-card {
  margin-top: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: none;
}
.result-card.show { display: block; }

.result-header {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.result-title { font-size: 13px; font-weight: 600; color: var(--text); }
.ai-badge {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-light);
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}

.result-fields {
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

@media (max-width: 480px) {
  .result-fields { grid-template-columns: 1fr; }
}

.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-group.full { grid-column: 1 / -1; }
.field-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }

.field-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
  width: 100%;
  transition: border 0.15s;
}
.field-input:focus { outline: none; border-color: var(--accent-mid); }
select.field-input { cursor: pointer; }

.register-btn {
  margin: 0 14px 14px;
  width: calc(100% - 28px);
  padding: 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  font-family: inherit;
}
.register-btn:hover { opacity: 0.85; }
.register-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── TABLE ── */
.table-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.month-select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 12px;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
  cursor: pointer;
}

.search-input {
  flex: 1;
  min-width: 120px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 12px;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { outline: none; border-color: var(--accent-mid); }

.export-btn {
  padding: 7px 14px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  transition: background 0.15s;
}
.export-btn:hover { background: var(--surface2); }

.expense-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.expense-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.expense-table th {
  background: var(--surface2);
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.expense-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}

.expense-table tr:last-child td { border-bottom: none; }
.expense-table tr:hover td { background: var(--surface2); }

.cat-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  white-space: nowrap;
}

.amount-cell { font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }

.del-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text3);
  font-size: 14px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all 0.1s;
}
.del-btn:hover { background: var(--danger-light); color: var(--danger); }

.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text3);
  font-size: 14px;
}

/* ── SUMMARY ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}

.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}

.summary-card-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}

.summary-card-amount {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.summary-card-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

.breakdown-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.breakdown-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.breakdown-table th {
  background: var(--surface2);
  padding: 10px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
}
.breakdown-table th:last-child { text-align: right; }
.breakdown-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.breakdown-table tr:last-child td { border-bottom: none; font-weight: 700; }
.breakdown-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: #fff;
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── LOADING OVERLAY ── */
.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.3);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.loading-overlay.show { display: flex; }
.loading-box {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px 32px;
  text-align: center;
  min-width: 200px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text2); }

/* ── CATEGORY COLORS ── */
.cat-旅費交通費 { background: #e8f3fe; color: #1a5fa8; }
.cat-車両費 { background: #fef3e2; color: #8a4500; }
.cat-接待交際費 { background: #fce8f3; color: #8a1a5a; }
.cat-消耗品費 { background: #e8fef0; color: #1a6b3a; }
.cat-通信費 { background: #f0e8fe; color: #5a1a8a; }
.cat-地代家賃 { background: #fef0e8; color: #8a3a1a; }
.cat-損害保険料 { background: #e8f0fe; color: #1a3a8a; }
.cat-会議研修費 { background: #f8f8e8; color: #6a6a00; }
.cat-租税公課 { background: #fee8e8; color: #8a1a1a; }
.cat-修繕費 { background: #e8fefe; color: #006a6a; }
.cat-支払手数料 { background: #f0f0f0; color: #4a4a4a; }
.cat-雑費 { background: #f5f0ea; color: #6a5030; }
.cat-other { background: var(--surface2); color: var(--text2); }

@media (prefers-color-scheme: dark) {
  .cat-旅費交通費 { background: #0d2140; color: #6aaee8; }
  .cat-車両費 { background: #301a00; color: #d49050; }
  .cat-接待交際費 { background: #300a20; color: #d070a0; }
  .cat-消耗品費 { background: #0a2010; color: #50c870; }
  .cat-通信費 { background: #200a30; color: #a050d0; }
  .cat-地代家賃 { background: #300a00; color: #d08050; }
  .cat-損害保険料 { background: #0a1030; color: #5080d0; }
  .cat-会議研修費 { background: #202000; color: #c0c050; }
  .cat-租税公課 { background: #300000; color: #d05050; }
  .cat-修繕費 { background: #002020; color: #00c0c0; }
  .cat-支払手数料 { background: #202020; color: #909090; }
  .cat-雑費 { background: #201508; color: #b09060; }
  .cat-other { background: #202020; color: #909090; }
}

.bar-wrap { display: flex; align-items: center; gap: 8px; }
.bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s; }

.month-total-row td { background: var(--accent-light) !important; font-weight: 700; color: var(--accent) !important; }

/* mobile tweaks */
@media (max-width: 600px) {
  .tabs { padding: 0 12px; }
  .tab { padding: 12px 12px; font-size: 12px; }
  .tab-panel { padding: 14px; }
  .expense-table th:nth-child(4),
  .expense-table td:nth-child(4) { display: none; }
  header { padding: 12px 14px; }
  header h1 { font-size: 13px; }
}
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo-mark">円</div>
    <h1>経費振り分けアプリ</h1>
    <button id="apiKeyBtn" onclick="openApiKeyModal()" title="APIキー設定" style="background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;white-space:nowrap;">🔑 APIキー</button>
    <span class="year-badge" id="yearBadge" onclick="openYearPicker()" title="クリックして年を変更" style="cursor:pointer;">2025年</span>
  </header>

  <!-- API KEY MODAL -->
  <div id="apiKeyModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:400;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border-radius:var(--radius);padding:24px;width:min(420px,92vw);box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <p style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;">Anthropic APIキーを設定</p>
      <p style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6;">APIキーを設定すると、画像・PDFの自動読み取りができます。<br>設定しなくても手動入力は使えます。<br>キーは <a href="https://console.anthropic.com/" target="_blank" style="color:var(--accent)">console.anthropic.com</a> で取得できます。<br>このデバイスのみに保存されます。</p>
      <input id="apiKeyInput" type="password" placeholder="sk-ant-..." autocomplete="off"
        style="width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;color:var(--text);font-family:monospace;margin-bottom:12px;">
      <div style="display:flex;gap:8px;">
        <button onclick="saveApiKey()" style="flex:1;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">保存する</button>
        <button onclick="clearApiKey()" style="padding:9px 14px;background:var(--danger-light);color:var(--danger);border:1px solid var(--danger);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;">削除</button>
        <button onclick="closeApiKeyModal()" style="padding:9px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;color:var(--text);">閉じる</button>
      </div>
    </div>
  </div>

  <!-- YEAR PICKER MODAL -->
  <div id="yearModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border-radius:var(--radius);padding:24px;min-width:260px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
      <p style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;">年度を変更</p>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;" id="yearGrid"></div>
      <div style="display:flex;gap:8px;align-items:center;border-top:1px solid var(--border);padding-top:14px;">
        <input id="customYearInput" type="number" placeholder="直接入力" min="2000" max="2099"
          style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;color:var(--text);font-family:inherit;">
        <button onclick="applyCustomYear()" style="padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">確定</button>
        <button onclick="closeYearPicker()" style="padding:7px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;color:var(--text);">キャンセル</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('scan')">📷 スキャン</button>
    <button class="tab" onclick="switchTab('list')">📋 一覧</button>
    <button class="tab" onclick="switchTab('summary')">📊 集計</button>
  </div>

  <!-- SCAN TAB -->
  <div id="tab-scan" class="tab-panel active">
    <div class="upload-section">
      <div class="upload-header">
        <div class="section-icon icon-green">📷</div>
        <span class="section-label">領収書・レシートをアップロード</span>
      </div>
      <div class="upload-body">
        <div class="dropzone" id="dropzone">
          <input type="file" id="fileInput" accept="image/*,application/pdf" multiple>
          <div class="drop-icon">📷</div>
          <p class="drop-main" id="uploadMain">写真を選択またはドロップ</p>
          <p class="drop-sub" id="uploadSub">JPG・PNG・HEIC 対応 / 複数同時OK<br><span id="pdfHint" style="color:var(--amber);"></span></p>
        </div>

        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <p class="progress-label" id="progressLabel">AIが読み取り中...</p>
        </div>

        <div class="result-card" id="resultCard">
          <div class="result-header">
            <span class="result-title" id="resultTitle">読み取り結果</span>
            <span class="ai-badge">AI 解析済み</span>
          </div>

          <div id="previewImgWrap" style="padding:0 14px 12px; display:none;">
            <img id="previewImg" style="max-height:160px; width:100%; object-fit:contain; border-radius:6px; border:1px solid var(--border);">
          </div>

          <div class="result-fields">
            <div class="field-group">
              <label class="field-label">日付</label>
              <input class="field-input" type="date" id="f_date">
            </div>
            <div class="field-group">
              <label class="field-label">月</label>
              <select class="field-input" id="f_month">
                <option value="1">1月</option><option value="2">2月</option>
                <option value="3">3月</option><option value="4">4月</option>

<script>
// ── DATA STORE ──
const YEAR_KEY = 'expenseYear';
let currentYear = parseInt(localStorage.getItem(YEAR_KEY) || new Date().getFullYear());

function storeKey(y) { return 'expenses_' + y + '_v2'; }
let expenses = JSON.parse(localStorage.getItem(storeKey(currentYear)) || '[]');

function initYear(y) {
  currentYear = y;
  localStorage.setItem(YEAR_KEY, y);
  expenses = JSON.parse(localStorage.getItem(storeKey(y)) || '[]');
  document.getElementById('yearBadge').textContent = y + '年';
  document.title = '経費振り分けアプリ ' + y;
}

function openYearPicker() {
  const grid = document.getElementById('yearGrid');
  const thisYear = new Date().getFullYear();
  grid.innerHTML = '';
  for (let y = thisYear - 2; y <= thisYear + 2; y++) {
    const btn = document.createElement('button');
    btn.textContent = y + '年';
    const active = y === currentYear;
    btn.style.cssText = 'padding:8px 4px;border-radius:var(--radius-sm);font-size:13px;font-weight:' + (active?'700':'500') + ';cursor:pointer;font-family:inherit;background:' + (active?'var(--accent)':'var(--surface2)') + ';color:' + (active?'#fff':'var(--text)') + ';border:1px solid ' + (active?'var(--accent)':'var(--border)') + ';';
    btn.onclick = () => selectYear(y);
    grid.appendChild(btn);
  }
  document.getElementById('customYearInput').value = currentYear;
  document.getElementById('yearModal').style.display = 'flex';
}

function selectYear(y) {
  initYear(y);
  closeYearPicker();
  showToast(y + '年のデータに切り替えました');
  const activeTab = document.querySelector('.tab-panel.active');
  if (activeTab && activeTab.id === 'tab-list') renderTable();
  if (activeTab && activeTab.id === 'tab-summary') renderSummary();
}

function applyCustomYear() {
  const v = parseInt(document.getElementById('customYearInput').value);
  if (v >= 2000 && v <= 2099) selectYear(v);
  else showToast('2000〜2099の範囲で入力してください');
}

function closeYearPicker() {
  document.getElementById('yearModal').style.display = 'none';
}

const CATEGORIES = [
  '旅費交通費','車両費','接待交際費','消耗品費','通信費',
  '地代家賃','損害保険料','会議・研修費','租税公課','修繕費','支払手数料','雑費'
];

function save() {
  localStorage.setItem(storeKey(currentYear), JSON.stringify(expenses));
}

function catClass(cat) {
  const map = {
    '旅費交通費':'cat-旅費交通費','車両費':'cat-車両費','接待交際費':'cat-接待交際費',
    '消耗品費':'cat-消耗品費','通信費':'cat-通信費','地代家賃':'cat-地代家賃',
    '損害保険料':'cat-損害保険料','会議・研修費':'cat-会議研修費','租税公課':'cat-租税公課',
    '修繕費':'cat-修繕費','支払手数料':'cat-支払手数料','雑費':'cat-雑費'
  };
  return map[cat] || 'cat-other';
}

function formatAmount(n) {
  return '¥' + (n || 0).toLocaleString('ja-JP');
}

// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['scan','list','summary'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'list') renderTable();
  if (name === 'summary') renderSummary();
}

// ── API KEY ──
const API_KEY_STORAGE = 'anthropic_api_key';

function getApiKey() {
  return localStorage.getItem(API_KEY_STORAGE) || '';
}

function updateApiKeyBtn() {
  const btn = document.getElementById('apiKeyBtn');
  const key = getApiKey();
  if (key) {
    btn.textContent = '🔑 設定済み';
    btn.style.color = 'var(--accent)';
    btn.style.borderColor = 'var(--accent)';
    const m = document.getElementById('uploadMain');
    const s = document.getElementById('uploadSub');
    const h = document.getElementById('pdfHint');
    if(m) m.textContent = '写真・PDF を選択またはドロップ';
    if(s) s.firstChild.textContent = 'JPG・PNG・HEIC・PDF 対応 / 複数同時OK';
    if(h) h.textContent = '';
  } else {
    btn.textContent = '🔑 APIキー（任意）';
    btn.style.color = 'var(--text2)';
    btn.style.borderColor = 'var(--border2)';
    const h = document.getElementById('pdfHint');
    if(h) h.textContent = 'PDFはスクリーンショットして画像で読み込んでください';
  }
}

function openApiKeyModal() {
  const key = getApiKey();
  document.getElementById('apiKeyInput').value = key ? '（保存済み）' : '';
  document.getElementById('apiKeyInput').placeholder = key ? '新しいキーを入力して上書き' : 'sk-ant-...';
  document.getElementById('apiKeyModal').style.display = 'flex';
}

function closeApiKeyModal() {
  document.getElementById('apiKeyModal').style.display = 'none';
}

function saveApiKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val || val === '（保存済み）') { closeApiKeyModal(); return; }
  if (!val.startsWith('sk-')) { showToast('APIキーは sk- で始まる形式です'); return; }
  localStorage.setItem(API_KEY_STORAGE, val);
  updateApiKeyBtn();
  closeApiKeyModal();
  showToast('APIキーを保存しました ✓');
}

function clearApiKey() {
  if (!confirm('APIキーを削除しますか？')) return;
  localStorage.removeItem(API_KEY_STORAGE);
  document.getElementById('apiKeyInput').value = '';
  updateApiKeyBtn();
  showToast('APIキーを削除しました');
}

document.getElementById('apiKeyModal').addEventListener('click', e => {
  if (e.target === document.getElementById('apiKeyModal')) closeApiKeyModal();
});
document.getElementById('apiKeyInput').addEventListener('focus', e => {
  if (e.target.value === '（保存済み）') e.target.value = '';
});


const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', async e => {
  const files = [...e.target.files];
  if (!files.length) return;
  for (const file of files) {
    await processFile(file);
  }
  fileInput.value = '';
});

const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.style.background = 'var(--accent-light)'; });
dropzone.addEventListener('dragleave', () => { dropzone.style.background = ''; });
dropzone.addEventListener('drop', async e => {
  e.preventDefault();
  dropzone.style.background = '';
  const files = [...e.dataTransfer.files];
  for (const file of files) await processFile(file);
});

async function processFile(file) {
  const isPDF = file.type === 'application/pdf';
  const isImg = file.type.startsWith('image/');
  if (!isPDF && !isImg) { showToast('対応していないファイル形式です'); return; }

  const apiKey = getApiKey();
  if (!apiKey) {
    if (isPDF) {
      showToast('PDFはスクリーンショットして画像で読み込んでください');
      return;
    }
    openApiKeyModal();
    showToast('画像読み取りにはAPIキーが必要です');
    return;
  }

  showLoading('AIが解析中...');

  // Show preview for images
  if (isImg) {
    const url = URL.createObjectURL(file);
    document.getElementById('previewImg').src = url;
    document.getElementById('previewImgWrap').style.display = 'block';
  } else {
    document.getElementById('previewImgWrap').style.display = 'none';
  }

  try {
    const base64 = await toBase64(file);
    const mediaType = isPDF ? 'application/pdf' : file.type;

    const systemPrompt = `あなたは経費精算AIです。領収書・レシートを解析して以下のJSONのみ返してください。前置き・コードブロック不要。
{
  "date": "YYYY-MM-DD",
  "category": "旅費交通費|車両費|接待交際費|消耗品費|通信費|地代家賃|損害保険料|会議・研修費|租税公課|修繕費|支払手数料|雑費",
  "amount": 1000,
  "vendor": "取引先名",
  "detail": "内容（簡潔に）"
}
カテゴリ判断の参考：交通機関・タクシー・駐車場→旅費交通費、ガソリン・ETC・車検→車両費、飲食打合せ・手土産→接待交際費、文具・消耗品・PC周辺→消耗品費、携帯・通信→通信費、駐車場月極→地代家賃、保険→損害保険料、書籍・研修→会議・研修費、税金・印紙→租税公課`;

    const contentBlock = isPDF
      ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } }
      : { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } };

    const headers = { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' };
    if (isPDF) headers['anthropic-beta'] = 'pdfs-2024-09-25';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: [
            contentBlock,
            { type: 'text', text: 'この領収書を解析してください。' }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    fillScanForm(parsed, file.name);
  } catch (err) {
    console.error(err);
    fillScanForm({}, file.name);
    showToast('解析に失敗しました。手動で入力してください。');
  } finally {
    hideLoading();
  }
}

function fillScanForm(data, filename) {
  if (data.date) {
    document.getElementById('f_date').value = data.date;
    const m = parseInt(data.date.split('-')[1]);
    document.getElementById('f_month').value = m;
  } else {
    const now = new Date();
    document.getElementById('f_date').value = now.toISOString().split('T')[0];
    document.getElementById('f_month').value = now.getMonth() + 1;
  }
  if (data.category) {
    const sel = document.getElementById('f_category');
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === data.category) { sel.selectedIndex = i; break; }
    }
  }
  document.getElementById('f_amount').value = data.amount || '';
  document.getElementById('f_vendor').value = data.vendor || '';
  document.getElementById('f_detail').value = data.detail || '';
  document.getElementById('resultTitle').textContent = filename ? `読み取り結果：${filename}` : '読み取り結果';
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function registerEntry() {
  const date = document.getElementById('f_date').value;
  const month = parseInt(document.getElementById('f_month').value);
  const category = document.getElementById('f_category').value;
  const amount = parseInt(document.getElementById('f_amount').value) || 0;
  const vendor = document.getElementById('f_vendor').value;
  const detail = document.getElementById('f_detail').value;

  if (!date || !amount) { showToast('日付と金額は必須です'); return; }

  expenses.push({ id: Date.now(), date, month, category, amount, vendor, detail });
  save();
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('previewImgWrap').style.display = 'none';
  showToast('登録しました ✓');
}

function registerManual() {
  const date = document.getElementById('m_date').value;
  const month = date ? parseInt(date.split('-')[1]) : new Date().getMonth() + 1;
  const category = document.getElementById('m_category').value;
  const amount = parseInt(document.getElementById('m_amount').value) || 0;
  const vendor = document.getElementById('m_vendor').value;
  const detail = document.getElementById('m_detail').value;

  if (!amount) { showToast('金額を入力してください'); return; }

  expenses.push({ id: Date.now(), date: date || new Date().toISOString().split('T')[0], month, category, amount, vendor, detail });
  save();
  document.getElementById('m_date').value = '';
  document.getElementById('m_amount').value = '';
  document.getElementById('m_vendor').value = '';
  document.getElementById('m_detail').value = '';
  showToast('登録しました ✓');
}

// ── TABLE ──
function renderTable() {
  const monthFilter = document.getElementById('filterMonth').value;
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = expenses.filter(e => {
    if (monthFilter && e.month !== parseInt(monthFilter)) return false;
    if (search && !((e.vendor || '').toLowerCase().includes(search) || (e.detail || '').toLowerCase().includes(search) || (e.category || '').toLowerCase().includes(search))) return false;
    return true;
  });

  filtered.sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  const tbody = document.getElementById('tableBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">データがありません</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(e => `
    <tr>
      <td style="white-space:nowrap;color:var(--text2);font-size:12px;">${formatDate(e.date)}</td>
      <td><span class="cat-badge ${catClass(e.category)}">${e.category}</span></td>
      <td class="amount-cell">${formatAmount(e.amount)}</td>
      <td style="color:var(--text2);font-size:12px;">
        <div style="font-weight:500;color:var(--text);font-size:13px;">${e.vendor || '-'}</div>
        <div>${e.detail || ''}</div>
      </td>
      <td><button class="del-btn" onclick="deleteEntry(${e.id})">✕</button></td>
    </tr>
  `).join('');
}

function formatDate(d) {
  if (!d) return '-';
  const parts = d.split('-');
  return `${parts[1]}/${parts[2]}`;
}

function deleteEntry(id) {
  if (!confirm('削除しますか？')) return;
  expenses = expenses.filter(e => e.id !== id);
  save();
  renderTable();
  showToast('削除しました');
}

// ── SUMMARY ──
function renderSummary() {
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  const count = expenses.length;
  const months = [...new Set(expenses.map(e => e.month))].length;

  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card">
      <div class="summary-card-label">年間合計</div>
      <div class="summary-card-amount">${formatAmount(total)}</div>
      <div class="summary-card-sub">${count}件</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-label">月平均</div>
      <div class="summary-card-amount">${months ? formatAmount(Math.round(total / months)) : '¥0'}</div>
      <div class="summary-card-sub">${months}ヶ月分</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-label">最大月</div>
      <div class="summary-card-amount">${getMaxMonth()}</div>
      <div class="summary-card-sub">最も多かった月</div>
    </div>
  `;

  // Category breakdown
  const byCategory = {};
  CATEGORIES.forEach(c => byCategory[c] = { count: 0, amount: 0 });
  expenses.forEach(e => {
    const cat = e.category || 'その他';
    if (!byCategory[cat]) byCategory[cat] = { count: 0, amount: 0 };
    byCategory[cat].count++;
    byCategory[cat].amount += e.amount;
  });

  const sorted = Object.entries(byCategory).filter(([,v]) => v.amount > 0).sort((a, b) => b[1].amount - a[1].amount);
  const maxAmt = sorted[0]?.[1].amount || 1;

  const tbody = document.getElementById('breakdownBody');
  tbody.innerHTML = sorted.map(([cat, data]) => `
    <tr>
      <td><span class="cat-badge ${catClass(cat)}">${cat}</span></td>
      <td style="color:var(--text2)">${data.count}件</td>
      <td>
        <div class="bar-wrap">
          <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(data.amount/total*100)}%"></div></div>
          <span style="font-size:11px;color:var(--text2);min-width:32px">${Math.round(data.amount/total*100)}%</span>
        </div>
      </td>
      <td>${formatAmount(data.amount)}</td>
    </tr>
  `).join('') + `<tr><td colspan="3" style="color:var(--text2)">合計</td><td>${formatAmount(total)}</td></tr>`;
}

function getMaxMonth() {
  const byMonth = {};
  expenses.forEach(e => {
    byMonth[e.month] = (byMonth[e.month] || 0) + e.amount;
  });
  const max = Object.entries(byMonth).sort((a, b) => b[1] - a[1])[0];
  return max ? `${max[0]}月` : '-';
}

// ── EXCEL EXPORT ──
function exportToExcel() {
  if (!expenses.length) { showToast('データがありません'); return; }
  showLoading('Excelを生成中...');

  try {
    const wb = XLSX.utils.book_new();
    const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const catList = CATEGORIES;

    months.forEach((mName, mi) => {
      const m = mi + 1;
      const mExpenses = expenses.filter(e => e.month === m).sort((a, b) => (a.date || '').localeCompare(b.date || ''));

      const wsData = [
        [null, '日付', '借方科目', '金　額', '取引先', '内　　容'],
      ];

      // category totals (right side columns)
      const catTotals = {};
      catList.forEach(c => {
        catTotals[c] = mExpenses.filter(e => e.category === c).reduce((s, e) => s + e.amount, 0);
      });

      mExpenses.forEach((e, i) => {
        const row = [
          i + 1,
          e.date ? new Date(e.date) : null,
          e.category,
          e.amount,
          e.vendor || '',
          e.detail || '',
          null,
        ];
        if (i === 0) {
          row.push('旅費交通費', catTotals['旅費交通費']);
        } else if (i === 1) {
          row.push('車両費', catTotals['車両費']);
        } else if (i === 2) {
          row.push('消耗品費', catTotals['消耗品費']);
        } else if (i === 3) {
          row.push('接待交際費', catTotals['接待交際費']);
        } else if (i === 4) {
          row.push('通信費', catTotals['通信費']);
        } else if (i === 5) {
          row.push('地代家賃', catTotals['地代家賃']);
        } else if (i === 6) {
          row.push('損害保険料', catTotals['損害保険料']);
        } else if (i === 7) {
          row.push('会議・研修費', catTotals['会議・研修費']);
        } else if (i === 8) {
          row.push('租税公課', catTotals['租税公課']);
        } else if (i === 9) {
          row.push('修繕費', catTotals['修繕費']);
        } else if (i === 10) {
          row.push('支払手数料', catTotals['支払手数料']);
        } else if (i === 11) {
          row.push('雑費', catTotals['雑費']);
        } else if (i === 12) {
          const total = mExpenses.reduce((s, e) => s + e.amount, 0);
          row.push('計', total);
        }
        wsData.push(row);
      });

      const ws = XLSX.utils.aoa_to_sheet(wsData);
      ws['!cols'] = [
        { wch: 4 }, { wch: 12 }, { wch: 12 }, { wch: 10 },
        { wch: 20 }, { wch: 24 }, { wch: 2 }, { wch: 12 }, { wch: 10 }
      ];
      XLSX.utils.book_append_sheet(wb, ws, mName);
    });

    // Sheet1: yearly summary
    const summaryData = [
      [null, null, '1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月','合計'],
    ];
    catList.forEach(cat => {
      const row = [null, cat];
      let total = 0;
      for (let m = 1; m <= 12; m++) {
        const v = expenses.filter(e => e.month === m && e.category === cat).reduce((s, e) => s + e.amount, 0);
        row.push(v || 0);
        total += v;
      }
      row.push(total);
      summaryData.push(row);
    });

    const totalRow = [null, null];
    for (let m = 1; m <= 12; m++) {
      totalRow.push(expenses.filter(e => e.month === m).reduce((s, e) => s + e.amount, 0));
    }
    totalRow.push(expenses.reduce((s, e) => s + e.amount, 0));
    summaryData.push(totalRow);

    const wsSum = XLSX.utils.aoa_to_sheet(summaryData);
    wsSum['!cols'] = [{ wch: 2 }, { wch: 12 }, ...Array(13).fill({ wch: 10 })];
    XLSX.utils.book_append_sheet(wb, wsSum, 'Sheet1');

    XLSX.writeFile(wb, `経費まとめ_${currentYear}年分.xlsx`);
    showToast('Excelを書き出しました ✓');
  } catch(err) {
    console.error(err);
    showToast('書き出しに失敗しました');
  } finally {
    hideLoading();
  }
}

// ── UTILITIES ──
function toBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg || 'しばらくお待ちください...';
  document.getElementById('loadingOverlay').classList.add('show');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
